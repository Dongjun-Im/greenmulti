name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: '릴리스 태그(예: v1.5.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve tag
        id: vars
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            $tag = "${{ github.event.inputs.tag }}"
          } else {
            $tag = "${{ github.ref_name }}"
          }
          $version = $tag.TrimStart('v','V')
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install wxPython==4.2.2 requests beautifulsoup4 lxml cryptography pywin32 comtypes pyinstaller

      - name: Build exe with PyInstaller
        shell: pwsh
        run: |
          $OutputEncoding = [Console]::OutputEncoding = [Console]::InputEncoding = [Text.UTF8Encoding]::new($false)
          chcp 65001 > $null
          python -m PyInstaller chorok_multi.spec --noconfirm

      - name: Install Inno Setup
        shell: pwsh
        run: |
          choco install innosetup -y --no-progress

      - name: Build installer
        shell: pwsh
        run: |
          $OutputEncoding = [Console]::OutputEncoding = [Console]::InputEncoding = [Text.UTF8Encoding]::new($false)
          chcp 65001 > $null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Create portable ZIP
        shell: pwsh
        run: |
          $OutputEncoding = [Console]::OutputEncoding = [Console]::InputEncoding = [Text.UTF8Encoding]::new($false)
          chcp 65001 > $null
          $dist = "dist/초록멀티 v${{ steps.vars.outputs.version }}"
          if (-not (Test-Path $dist)) {
            $dist = Get-ChildItem "dist" -Directory | Select-Object -First 1 -ExpandProperty FullName
          }
          $parent = Split-Path $dist -Parent
          $name = Split-Path $dist -Leaf
          $zip = "installer_out/${name}.zip"
          New-Item -ItemType Directory -Force -Path "installer_out" | Out-Null
          Push-Location $parent
          Compress-Archive -Path $name -DestinationPath "$env:GITHUB_WORKSPACE/$zip" -Force
          Pop-Location

      - name: Normalize asset filenames (Korean prefix)
        shell: pwsh
        run: |
          $OutputEncoding = [Console]::OutputEncoding = [Console]::InputEncoding = [Text.UTF8Encoding]::new($false)
          chcp 65001 > $null
          python scripts/rename_release_assets.py

      - name: Generate manifest.json (delta update support)
        shell: pwsh
        run: |
          $OutputEncoding = [Console]::OutputEncoding = [Console]::InputEncoding = [Text.UTF8Encoding]::new($false)
          chcp 65001 > $null
          $dist = Get-ChildItem "dist" -Directory | Select-Object -First 1 -ExpandProperty FullName
          $exeName = (Get-ChildItem -Path $dist -Filter "*.exe" | Select-Object -First 1).Name
          $files = @()
          Get-ChildItem -Path $dist -Recurse -File | ForEach-Object {
            $rel = $_.FullName.Substring($dist.Length + 1) -replace '\\', '/'
            $hash = (Get-FileHash -Algorithm SHA256 $_.FullName).Hash.ToLower()
            $files += [ordered]@{ path = $rel; sha256 = $hash }
          }
          $manifest = [ordered]@{
            version    = "${{ steps.vars.outputs.version }}"
            executable = $exeName
            files      = $files
          }
          $json = $manifest | ConvertTo-Json -Depth 5
          $json | Out-File -FilePath "installer_out/manifest.json" -Encoding utf8NoBOM

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chorok-multi-${{ steps.vars.outputs.version }}
          path: |
            installer_out/*.exe
            installer_out/*.sha256
            installer_out/*.zip
            installer_out/manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: 초록멀티 ${{ steps.vars.outputs.tag }}
          # RELEASE_NOTES.md 가 있으면 그 내용을 릴리스 본문으로 사용.
          # 없으면 자동 생성된 노트(커밋·PR 요약)로 폴백.
          body_path: ${{ hashFiles('RELEASE_NOTES.md') != '' && 'RELEASE_NOTES.md' || '' }}
          generate_release_notes: ${{ hashFiles('RELEASE_NOTES.md') == '' }}
          draft: false
          # 태그 이름에 하이픈이 있으면(예: v1.6.0-beta.1) 프리릴리스, 아니면 정식 릴리스.
          prerelease: ${{ contains(github.ref_name, '-') }}
          # 정식 릴리스일 때 /releases/latest 가 이 릴리스를 가리키도록 명시.
          # (prerelease 와는 배타적이므로 태그에 하이픈이 있으면 이 설정은 무시됨)
          make_latest: ${{ !contains(github.ref_name, '-') && 'true' || 'legacy' }}
          files: |
            installer_out/*.exe
            installer_out/*.sha256
            installer_out/*.zip
            installer_out/manifest.json
